services:
  pipeline:
    build: .
    env_file: .env
    volumes:
      - ./secrets:/secrets/:ro
      - ./pipeline:/app/pipeline
    command: bruin run /app/pipeline/
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/bruin-sa.json

  jupyter:
    build: .
    env_file: .env
    volumes:
      - ./secrets:/secrets/:ro
      - ./notebooks:/app/notebooks      # crea prima ./notebooks/
    ports:
      - "8888:8888"
    command: jupyter lab --ip=0.0.0.0 --allow-root --no-browser
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/bruin-sa.json

  terraform:
    build: .
    volumes:
      - ./secrets:/secrets/          # ✅ read-write per creare bruin-sa.json
    working_dir: /app/terraform
    command: >                      # ✅ Multi-line command
      sh -c "
        echo '🔨 Inizializzazione Terraform...'
        terraform init &&
        echo '📋 Plan...'
        terraform plan &&
        echo '🚀 Apply automatico...'
        terraform apply -auto-approve &&
      "
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/sa.json
    stdin_open: false               # ❌ Non serve per comando automatico
    tty: true                       # ✅ Utile per log colorati
